# ==============================================================================
# AI Test Agent 演示/测试环境（8 个容器）
# 用法: bash deploy/deploy-demo.sh
# 与生产环境差异:
#   LangGraph 用 in-memory 模式（无需 Postgres/Redis 存 agent 状态）
#   RAG 用本地存储（NetworkX + NanoVectorDB + JSON），无需 Neo4j/Milvus/Redis
#   去掉: mongo / redis(队列/KV) / minio / neo4j / milvus / milvus-etcd / milvus-minio
# ==============================================================================
name: ai-test-agent-demo

x-app-image: &app-image "ai-test-agent-app:${APP_IMAGE_TAG:-demo}"

services:
  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: ${POSTGRES_DB:-ai_test_platform_db}
    volumes:
      - pgdata-demo:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 24
    networks: [internal]

  langgraph:
    build:
      context: ..
      dockerfile: deploy/app.Dockerfile
    image: *app-image
    restart: unless-stopped
    env_file: [.env.demo]
    volumes:
      - backend-workspace-demo:/app/backend/workspace
    shm_size: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:2025/ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    command: ["/app/deploy/docker/entrypoint-langgraph-inmem.sh"]
    networks: [internal]

  backend:
    image: *app-image
    restart: unless-stopped
    env_file: [.env.demo]
    volumes:
      - backend-workspace-demo:/app/backend/workspace
    shm_size: 1g
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    command: ["/app/deploy/docker/entrypoint-backend.sh"]
    networks: [internal]

  ui:
    build:
      context: ..
      dockerfile: deploy/ui.Dockerfile
      args:
        NEXT_PUBLIC_LANGGRAPH_API_URL: ${NEXT_PUBLIC_LANGGRAPH_API_URL:?}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_TESTCASE_GENERATOR_ASSISTANT_ID: ${NEXT_PUBLIC_TESTCASE_GENERATOR_ASSISTANT_ID:-testcase_generator_agent}
    image: ai-test-agent-ui:${APP_IMAGE_TAG:-demo}
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://backend:8001
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000').then(r=>process.exit(r.status<500?0:1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [internal]

  nginx:
    image: nginx:1.27-bookworm
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx-demo.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      ui:
        condition: service_started
      backend:
        condition: service_started
      langgraph:
        condition: service_started
    networks: [internal]

  # ---------- RAG 服务（精简版：本地存储，无需外部存储服务） ----------
  docling:
    image: quay.io/docling-project/docling-serve:latest
    restart: unless-stopped
    environment:
      DOCLING_SERVE_LOAD_MODELS_AT_BOOT: "false"
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
      HF_HOME: /hf-cache
    volumes:
      - docling-models-demo:/hf-cache
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 60s
    networks: [internal]

  lightrag:
    build:
      context: ../LightRAG
      dockerfile: Dockerfile
    image: ai-test-agent-lightrag:${APP_IMAGE_TAG:-demo}
    restart: unless-stopped
    ports:
      - "${LIGHTRAG_PUBLISH_PORT:-9621}:9621"
    volumes:
      - lightrag-storage-demo:/app/data/rag_storage
      - lightrag-inputs-demo:/app/data/inputs
      - ./lightrag/.env:/app/.env:ro
    environment:
      HOST: "0.0.0.0"
      PORT: "9621"
      WORKING_DIR: /app/data/rag_storage
      INPUT_DIR: /app/data/inputs
    depends_on:
      docling:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9621/health',timeout=3).status<500 else 1)\" || exit 1"]
      interval: 15s
      timeout: 8s
      retries: 24
      start_period: 60s
    networks: [internal]

  rag-server:
    image: *app-image
    restart: unless-stopped
    env_file: [.env.demo]
    environment:
      RAG_BASE_URL: http://lightrag:9621
      RAG_USERNAME: admin
      RAG_PASSWORD: ${RAG_PASSWORD:?}
      RAG_SPACE_ID: ${RAG_SPACE_ID:-cmp_space}
    depends_on:
      lightrag:
        condition: service_healthy
    command: ["python", "/app/backend/app/agents/tools/testcase/mcp/rag_server.py", "--transport", "sse", "--port", "8008"]
    networks: [internal]

volumes:
  pgdata-demo:
  backend-workspace-demo:
  lightrag-storage-demo:
  lightrag-inputs-demo:
  docling-models-demo:

networks:
  internal:
    driver: bridge
