# ==============================================================================
# AI Test Agent 单源反代
# 浏览器只需访问 :80 —— 前端 / API / LangGraph 全部同源，规避 CORS
# ==============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # 附件上限 50MB（对应 ATTACHMENT_MAX_SIZE=52428800），留余量
    client_max_body_size 60m;

    # ---- FastAPI（浏览器普通 API + SSE 直连，一跳直达，不经过 Next） ----
    location /api/ {
        proxy_pass http://backend:8001; # 无 URI 部分，/api/... 原样透传
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE 必需：关闭缓冲，长超时
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---- LangGraph Server（浏览器 SDK 直连：threads/runs/stream） ----
    location /langgraph/ {
        proxy_pass http://langgraph:2026/; # 尾斜杠 = 剥离 /langgraph 前缀
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # /runs/stream 等 SSE 端点必需
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---- GitNexus 代码智能分析 API ----
    location /gitnexus-api/ {
        proxy_pass http://gitnexus:4747/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }

    # ---- FastAPI 根路径工具端点（便于部署验证与 API 文档） ----
    location ~ ^/(docs|redoc|openapi\.json|health)$ {
        proxy_pass http://backend:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- Next.js 前端 ----
    location / {
        proxy_pass http://ui:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
