<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="botGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6EE7F9"/>
      <stop offset="100%" stop-color="#4F7BFF"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34F5C5"/>
      <stop offset="100%" stop-color="#19C37D"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- 背景圆角方块 -->
  <rect width="64" height="64" rx="14" fill="#0F1729"/>

  <!-- 天线 -->
  <line x1="32" y1="9" x2="32" y2="15" stroke="url(#botGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="8" r="2.6" fill="url(#botGrad)"/>

  <!-- 机器人头部 -->
  <rect x="14" y="15" width="36" height="28" rx="9" fill="none" stroke="url(#botGrad)" stroke-width="3"/>

  <!-- 眼睛 -->
  <circle cx="24" cy="27" r="3.4" fill="url(#botGrad)"/>
  <circle cx="40" cy="27" r="3.4" fill="url(#botGrad)"/>

  <!-- 嘴部测试对勾 -->
  <path d="M23 34 l5 5 l9 -10" fill="none" stroke="url(#checkGrad)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)"/>

  <!-- 侧耳 -->
  <rect x="10" y="25" width="3" height="9" rx="1.5" fill="url(#botGrad)"/>
  <rect x="51" y="25" width="3" height="9" rx="1.5" fill="url(#botGrad)"/>

  <!-- 底座连接 -->
  <line x1="25" y1="43" x2="25" y2="48" stroke="url(#botGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="39" y1="43" x2="39" y2="48" stroke="url(#botGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="20" y="48" width="24" height="7" rx="3.5" fill="none" stroke="url(#botGrad)" stroke-width="2.5"/>
</svg>
